<!-- ====== READER MODE (Hidden) ====== -->
<div class="reader-overlay" id="readerOverlay">
    <div class="reader-container">
        <!-- Reader Header -->
        <div class="reader-header">
            <button class="reader-close" id="readerClose">
                <i class="fas fa-times"></i>
            </button>
            <div class="reader-info">
                <span id="readerTitle">Dragon Heir</span>
                <span id="readerChapter">Episode 1</span>
            </div>
            <div class="reader-controls">
                <button id="readerPrev"><i class="fas fa-chevron-left"></i></button>
                <span id="readerProgress">1 / 12</span>
                <button id="readerNext"><i class="fas fa-chevron-right"></i></button>
            </div>
        </div>

        <!-- Reader Content (Panel Komik) -->
        <div class="reader-content" id="readerContent">
            <!-- Panel akan di-generate oleh JS -->
        </div>

        <!-- Reader Footer -->
        <div class="reader-footer">
            <button class="btn-primary" id="readerPrevBtn"><i class="fas fa-chevron-left"></i> Episode Sebelumnya</button>
            <button class="btn-primary" id="readerNextBtn">Episode Selanjutnya <i class="fas fa-chevron-right"></i></button>
        </div>
    </div>
</div>
