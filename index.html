<!-- ====== READER MODE ====== -->
<div class="reader-overlay" id="readerOverlay">
    <div class="reader-container">
        <!-- Header -->
        <div class="reader-header">
            <button class="reader-close" id="readerClose">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="reader-info">
                <span id="readerTitle">🐉 Dragon Heir</span>
                <span id="readerChapter">Episode 1 · Pertemuan dengan Pyro</span>
            </div>
            <div class="reader-controls">
                <span id="readerProgress">Panel 1 / 5</span>
            </div>
        </div>

        <!-- Content -->
        <div class="reader-content" id="readerContent">
            <!-- Panel akan di-generate oleh JS -->
        </div>

        <!-- Footer Navigation -->
        <div class="reader-footer">
            <button class="reader-nav-btn" id="readerPrevBtn">
                <i class="fas fa-chevron-left"></i> Sebelumnya
            </button>
            <span id="readerPageInfo">1 / 5</span>
            <button class="reader-nav-btn" id="readerNextBtn">
                Selanjutnya <i class="fas fa-chevron-right"></i>
            </button>
        </div>
    </div>
</div>
